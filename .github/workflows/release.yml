name: Publish plugin release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: plugin-release
  cancel-in-progress: false

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate version files
        id: version
        shell: bash
        run: |
          VERSION="$(php scripts/validate-version.php)"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Decide whether to publish
        id: release_check
        env:
          GH_TOKEN: ${{ github.token }}
          CURRENT_VERSION: ${{ steps.version.outputs.version }}
          CURRENT_TAG: ${{ steps.version.outputs.tag }}
        shell: bash
        run: |
          if gh release view "$CURRENT_TAG" >/dev/null 2>&1; then
            echo "publish=false" >> "$GITHUB_OUTPUT"
            echo "Release $CURRENT_TAG already exists; nothing to publish."
            exit 0
          fi

          LATEST_TAG="$(gh release list \
            --exclude-drafts \
            --exclude-pre-releases \
            --limit 1 \
            --json tagName \
            --jq '.[0].tagName // ""')"
          LATEST_VERSION="${LATEST_TAG#v}"

          if [[ -n "$LATEST_VERSION" ]] && ! php -r \
            'exit(version_compare($argv[1], $argv[2], ">") ? 0 : 1);' \
            "$CURRENT_VERSION" "$LATEST_VERSION"; then
            echo "::error::Version $CURRENT_VERSION must be greater than latest release $LATEST_VERSION."
            exit 1
          fi

          echo "publish=true" >> "$GITHUB_OUTPUT"

      - name: Build WordPress ZIP
        if: steps.release_check.outputs.publish == 'true'
        run: ./build-zip.sh dist

      - name: Verify ZIP contents
        if: steps.release_check.outputs.publish == 'true'
        run: |
          unzip -t dist/idoneo-custom-fields.zip
          unzip -Z1 dist/idoneo-custom-fields.zip | grep -qx 'idoneo-custom-fields/idoneo-custom-fields.php'

      - name: Publish GitHub release
        if: steps.release_check.outputs.publish == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.version.outputs.tag }}
        run: |
          gh release create "$RELEASE_TAG" \
            dist/idoneo-custom-fields.zip \
            --target "$GITHUB_SHA" \
            --title "IDONEO Custom Fields $RELEASE_TAG" \
            --generate-notes
